name: worth
description: A personal wealth operating system.
version: 1.4.0+4

publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Firebase & Sync
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1
  connectivity_plus: ^6.0.1

  # Database & Encryption
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Data Visualization
  fl_chart: ^0.68.0

  # Fonts & UI Utilities
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  uuid: ^4.4.0
  collection: ^1.18.0
  local_auth: ^2.2.0
  permission_handler: ^11.3.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  intl: ^0.19.0

  # JSON Serialization & Freezed
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.9
  drift_dev: ^2.20.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

  # Lints
  flutter_lints: ^3.0.1

  # Launcher Icons
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/graphics/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/graphics/icons/
    - assets/graphics/illustrations/
    - assets/graphics/backgrounds/
    - assets/graphics/textures/
